<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元宵节灯笼祝福生成器</title>
    <meta name="description" content="生成精美的元宵节灯笼祝福卡片，分享给亲朋好友！">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 200, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .card-preview {
            background: linear-gradient(145deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            border-radius: 20px;
            padding: 40px 20px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* Lantern styles */
        .lantern-container {
            position: relative;
            margin-bottom: 30px;
        }

        .lantern {
            width: 120px;
            height: 160px;
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            border-radius: 60px 60px 20px 20px;
            position: relative;
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.6), inset 0 -20px 40px rgba(0, 0, 0, 0.2);
            animation: swing 3s ease-in-out infinite;
        }

        .lantern::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.8);
        }

        .lantern::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 35px;
            background: linear-gradient(180deg, #e67e22, #d35400);
            border-radius: 0 0 20px 20px;
        }

        .lantern-top {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 25px;
            background: #8b4513;
        }

        .lantern-ribbon {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 20px;
            border: 3px solid #f1c40f;
            border-radius: 5px;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .blessing-text {
            font-size: 1.8rem;
            color: #fff;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            font-weight: bold;
            line-height: 1.4;
            padding: 0 20px;
        }

        .sender-info {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }

        .decoration {
            position: absolute;
            font-size: 2rem;
            opacity: 0.8;
        }

        .decoration-1 { top: 20px; left: 20px; animation: float 2s ease-in-out infinite; }
        .decoration-2 { top: 20px; right: 20px; animation: float 2s ease-in-out infinite 0.5s; }
        .decoration-3 { bottom: 20px; left: 20px; animation: float 2s ease-in-out infinite 1s; }
        .decoration-4 { bottom: 20px; right: 20px; animation: float 2s ease-in-out infinite 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .form-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #feca57;
            background: rgba(255, 255, 255, 0.15);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        .style-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .style-option {
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-size: 0.85rem;
            color: #fff;
        }

        .style-option:hover {
            transform: translateY(-3px);
        }

        .style-option.active {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f1c40f, #e67e22);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(241, 196, 15, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .history-section {
            margin-top: 20px;
        }

        .history-title {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-history {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 20px;
        }

        /* Background styles */
        .bg-festival { background: linear-gradient(145deg, #e74c3c, #f39c12, #f1c40f) !important; }
        .bg-romantic { background: linear-gradient(145deg, #ff6b6b, #ee5a6f, #ff9ff3) !important; }
        .bg-dream { background: linear-gradient(145deg, #a29bfe, #6c5ce7, #a55eea) !important; }
        .bg-ocean { background: linear-gradient(145deg, #48dbfb, #0abde3, #00d2d3) !important; }
        .bg-forest { background: linear-gradient(145deg, #2ecc71, #27ae60, #1abc9c) !important; }
        .bg-sunset { background: linear-gradient(145deg, #fd79a8, #e84393, #d63031) !important; }
        .bg-royal { background: linear-gradient(145deg, #6c5ce7, #a55eea, #8854d0) !important; }
        .bg-gold { background: linear-gradient(145deg, #f1c40f, #f39c12, #e67e22) !important; }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .blessing-text { font-size: 1.4rem; }
            .style-options { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 元宵节灯笼祝福生成器 🏮</h1>
        <p class="subtitle">生成精美灯笼祝福卡片，分享给最爱的人</p>

        <div class="card-preview" id="cardPreview">
            <span class="decoration decoration-1">✨</span>
            <span class="decoration decoration-2">🎆</span>
            <span class="decoration decoration-3">🌟</span>
            <span class="decoration decoration-4">🎇</span>

            <div class="lantern-container">
                <div class="lantern-top"></div>
                <div class="lantern">
                    <div class="lantern-ribbon"></div>
                </div>
            </div>

            <div class="blessing-text" id="previewText">正月十五月圆夜，灯火阑珊共团圆</div>
            <div class="sender-info" id="previewSender">—— 祝福来自 XXX</div>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>选择背景风格</label>
                <div class="style-options" id="styleOptions">
                    <div class="style-option bg-festival active" data-style="bg-festival" data-bg="linear-gradient(145deg, #e74c3c, #f39c12, #f1c40f)">🏮 节日红</div>
                    <div class="style-option bg-romantic" data-style="bg-romantic" data-bg="linear-gradient(145deg, #ff6b6b, #ee5a6f, #ff9ff3)">💖 浪漫粉</div>
                    <div class="style-option bg-dream" data-style="bg-dream" data-bg="linear-gradient(145deg, #a29bfe, #6c5ce7, #a55eea">🌙 梦幻紫</div>
                    <div class="style-option bg-ocean" data-style="bg-ocean" data-bg="linear-gradient(145deg, #48dbfb, #0abde3, #00d2d3)">🌊 海洋蓝</div>
                    <div class="style-option bg-forest" data-style="bg-forest" data-bg="linear-gradient(145deg, #2ecc71, #27ae60, #1abc9c)">🌲 森林绿</div>
                    <div class="style-option bg-sunset" data-style="bg-sunset" data-bg="linear-gradient(145deg, #fd79a8, #e84393, #d63031)">🌅 夕阳红</div>
                    <div class="style-option bg-royal" data-style="bg-royal" data-bg="linear-gradient(145deg, #6c5ce7, #a55eea, #8854d0)">👑 皇室紫</div>
                    <div class="style-option bg-gold" data-style="bg-gold" data-bg="linear-gradient(145deg, #f1c40f, #f39c12, #e67e22)">✨ 金色辉煌</div>
                </div>
            </div>

            <div class="form-group">
                <label>选择祝福语</label>
                <select id="blessingSelect">
                    <option value="default">—— 选择内置祝福语 ——</option>
                    <option value="1">正月十五月圆夜，灯火阑珊共团圆</option>
                    <option value="2">元宵佳节到，花灯送吉祥</option>
                    <option value="3">月圆人圆事圆，团团圆圆</option>
                    <option value="4">灯火阑珊处，遇见最美好的你</option>
                    <option value="5">愿你如元宵般圆润甜蜜</option>
                    <option value="6">花好月圆夜，团圆共此时</option>
                    <option value="7">元宵甜甜，生活圆圆</option>
                    <option value="8">良辰美景，元宵佳节</option>
                </select>
            </div>

            <div class="form-group">
                <label>或自定义祝福语</label>
                <textarea id="customBlessing" rows="2" placeholder="输入自定义祝福语..."></textarea>
            </div>

            <div class="form-group">
                <label>你的昵称（显示在卡片上）</label>
                <input type="text" id="senderName" placeholder="例如：小明" maxlength="20">
            </div>

            <button class="btn btn-primary" onclick="generateCard()">🎉 生成祝福卡片</button>
            <button class="btn btn-secondary" onclick="downloadCard()">📥 下载图片</button>
            <button class="btn btn-secondary" onclick="copyCard()">📋 复制到剪贴板</button>
        </div>

        <div class="history-section">
            <div class="history-title">历史记录</div>
            <div class="history-list" id="historyList">
                <div class="empty-history">暂无历史记录</div>
            </div>
        </div>
    </div>

    <script>
        const blessings = {
            '1': '正月十五月圆夜，灯火阑珊共团圆',
            '2': '元宵佳节到，花灯送吉祥',
            '3': '月圆人圆事圆，团团圆圆',
            '4': '灯火阑珊处，遇见最美好的你',
            '5': '愿你如元宵般圆润甜蜜',
            '6': '花好月圆夜，团圆共此时',
            '7': '元宵甜甜，生活圆圆',
            '8': '良辰美景，元宵佳节'
        };

        let currentStyle = 'bg-festival';
        let currentBg = 'linear-gradient(145deg, #e74c3c, #f39c12, #f1c40f)';

        // Initialize style options
        document.querySelectorAll('.style-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.style-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                currentStyle = option.dataset.style;
                currentBg = option.dataset.bg;
                document.getElementById('cardPreview').style.background = currentBg;
            });
        });

        // Blessing selection
        document.getElementById('blessingSelect').addEventListener('change', (e) => {
            if (e.target.value !== 'default') {
                document.getElementById('customBlessing').value = '';
                document.getElementById('previewText').textContent = blessings[e.target.value];
            }
        });

        // Custom blessing
        document.getElementById('customBlessing').addEventListener('input', (e) => {
            if (e.target.value) {
                document.getElementById('blessingSelect').value = 'default';
                document.getElementById('previewText').textContent = e.target.value;
            }
        });

        // Sender name
        document.getElementById('senderName').addEventListener('input', (e) => {
            const name = e.target.value || 'XXX';
            document.getElementById('previewSender').textContent = `—— 祝福来自 ${name}`;
        });

        function generateCard() {
            const blessing = document.getElementById('customBlessing').value || document.getElementById('previewText').textContent;
            const sender = document.getElementById('senderName').value || '神秘人';

            // Save to history
            saveHistory(blessing, sender, currentStyle);

            // Show success message
            alert('🎊 祝福卡片已生成！可以下载或复制分享啦~');
        }

        function saveHistory(blessing, sender, style) {
            let history = JSON.parse(localStorage.getItem('lantern-blessing-history') || '[]');
            history.unshift({ blessing, sender, style, time: new Date().toLocaleString() });
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('lantern-blessing-history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('lantern-blessing-history') || '[]');
            const container = document.getElementById('historyList');

            if (history.length === 0) {
                container.innerHTML = '<div class="empty-history">暂无历史记录</div>';
                return;
            }

            container.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="loadHistory(${index})">
                    ${item.blessing.substring(0, 20)}... - ${item.sender}
                </div>
            `).join('');
        }

        function loadHistory(index) {
            const history = JSON.parse(localStorage.getItem('lantern-blessing-history') || '[]');
            const item = history[index];
            if (item) {
                document.getElementById('previewText').textContent = item.blessing;
                document.getElementById('senderName').value = item.sender;
                document.getElementById('previewSender').textContent = `—— 祝福来自 ${item.sender}`;

                document.querySelectorAll('.style-option').forEach(o => {
                    o.classList.remove('active');
                    if (o.dataset.style === item.style) {
                        o.classList.add('active');
                        currentStyle = item.style;
                        currentBg = o.dataset.bg;
                        document.getElementById('cardPreview').style.background = currentBg;
                    }
                });
            }
        }

        function downloadCard() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const card = document.getElementById('cardPreview');

            canvas.width = 800;
            canvas.height = 600;

            // Draw background
            const gradient = ctx.createLinearGradient(0, 0, 800, 600);
            const colors = getGradientColors(currentStyle);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(0.5, colors[1]);
            gradient.addColorStop(1, colors[2]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 600);

            // Draw decorations
            ctx.font = '40px Arial';
            ctx.fillText('✨', 50, 60);
            ctx.fillText('🎆', 700, 60);
            ctx.fillText('🌟', 50, 540);
            ctx.fillText('🎇', 700, 540);

            // Draw lantern
            drawLantern(ctx, 400, 200);

            // Draw text
            const text = document.getElementById('previewText').textContent;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 4;
            wrapText(ctx, text, 400, 420, 700, 40);

            // Draw sender
            const sender = document.getElementById('senderName').value || '神秘人';
            ctx.font = '20px "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.fillText(`—— 祝福来自 ${sender}`, 400, 520);

            // Download
            const link = document.createElement('a');
            link.download = '元宵节祝福.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function getGradientColors(style) {
            const colors = {
                'bg-festival': ['#e74c3c', '#f39c12', '#f1c40f'],
                'bg-romantic': ['#ff6b6b', '#ee5a6f', '#ff9ff3'],
                'bg-dream': ['#a29bfe', '#6c5ce7', '#a55eea'],
                'bg-ocean': ['#48dbfb', '#0abde3', '#00d2d3'],
                'bg-forest': ['#2ecc71', '#27ae60', '#1abc9c'],
                'bg-sunset': ['#fd79a8', '#e84393', '#d63031'],
                'bg-royal': ['#6c5ce7', '#a55eea', '#8854d0'],
                'bg-gold': ['#f1c40f', '#f39c12', '#e67e22']
            };
            return colors[style] || colors['bg-festival'];
        }

        function drawLantern(ctx, x, y) {
            // Lantern body
            const gradient = ctx.createLinearGradient(x - 60, y, x + 60, y);
            gradient.addColorStop(0, '#e74c3c');
            gradient.addColorStop(1, '#c0392b');

            ctx.beginPath();
            ctx.moveTo(x - 50, y - 80);
            ctx.quadraticCurveTo(x - 60, y, x - 50, y + 80);
            ctx.quadraticCurveTo(x + 60, y + 80, x + 50, y + 80);
            ctx.quadraticCurveTo(x + 60, y, x + 50, y - 80);
            ctx.quadraticCurveTo(x - 60, y - 80, x - 50, y - 80);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Lantern glow
            ctx.shadowColor = 'rgba(231, 76, 60, 0.8)';
            ctx.shadowBlur = 30;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Top
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(x, y - 90, 10, 0, Math.PI * 2);
            ctx.fill();

            // Bottom
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.moveTo(x - 20, y + 80);
            ctx.lineTo(x + 20, y + 80);
            ctx.lineTo(x, y + 110);
            ctx.closePath();
            ctx.fill();

            // Ribbon
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x - 35, y - 20);
            ctx.lineTo(x + 35, y - 20);
            ctx.stroke();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const lines = [];
            let currentLine = '';

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const testLine = currentLine + char;
                const metrics = ctx.measureText(testLine);

                if (metrics.width > maxWidth && currentLine !== '') {
                    lines.push(currentLine);
                    currentLine = char;
                } else {
                    currentLine = testLine;
                }
            }
            lines.push(currentLine);

            lines.forEach((line, index) => {
                ctx.fillText(line, x, y + index * lineHeight);
            });
        }

        async function copyCard() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const card = document.getElementById('cardPreview');

                canvas.width = 800;
                canvas.height = 600;

                // Draw background
                const gradient = ctx.createLinearGradient(0, 0, 800, 600);
                const colors = getGradientColors(currentStyle);
                gradient.addColorStop(0, colors[0]);
                gradient.addColorStop(0.5, colors[1]);
                gradient.addColorStop(1, colors[2]);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 800, 600);

                // Draw decorations
                ctx.font = '40px Arial';
                ctx.fillText('✨', 50, 60);
                ctx.fillText('🎆', 700, 60);
                ctx.fillText('🌟', 50, 540);
                ctx.fillText('🎇', 700, 540);

                // Draw lantern
                drawLantern(ctx, 400, 200);

                // Draw text
                const text = document.getElementById('previewText').textContent;
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                wrapText(ctx, text, 400, 420, 700, 40);

                // Draw sender
                const sender = document.getElementById('senderName').value || '神秘人';
                ctx.font = '20px "PingFang SC", "Microsoft YaHei", sans-serif';
                ctx.fillText(`—— 祝福来自 ${sender}`, 400, 520);

                // Copy to clipboard
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]);
                        alert('📋 已复制到剪贴板！');
                    } catch (e) {
                        alert('复制失败，请手动截图分享~');
                    }
                });
            } catch (e) {
                alert('复制失败，请手动截图分享~');
            }
        }

        // Initialize history on load
        renderHistory();
    </script>
</body>
</html>
