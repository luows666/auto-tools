<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考祝福卡片生成器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .style-option {
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            font-size: 12px;
            color: #fff;
            font-weight: 600;
        }

        .style-option:hover {
            transform: scale(1.05);
        }

        .style-option.active {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        .style-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .style-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .style-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .style-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .style-5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .style-6 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333 !important; }
        .style-7 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #333 !important; }
        .style-8 { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #333 !important; }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(245,87,108,0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245,87,108,0.6);
        }

        .preview {
            display: none;
            margin-top: 30px;
        }

        .preview.active {
            display: block;
        }

        .preview-card {
            width: 100%;
            min-height: 400px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .preview-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            50% { transform: translate(-50%, -50%) rotate(180deg); }
        }

        .preview-card .badge {
            background: rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            color: inherit;
            margin-bottom: 20px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 1;
        }

        .preview-card .title {
            font-size: 32px;
            font-weight: 700;
            color: inherit;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .preview-card .name {
            font-size: 24px;
            font-weight: 600;
            color: inherit;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .preview-card .message {
            font-size: 18px;
            color: inherit;
            line-height: 1.8;
            max-width: 350px;
            position: relative;
            z-index: 1;
            opacity: 0.95;
        }

        .preview-card .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: inherit;
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }

        .preview-card .decoration {
            position: absolute;
            font-size: 40px;
            opacity: 0.3;
        }

        .decoration-1 { top: 20px; left: 20px; }
        .decoration-2 { top: 20px; right: 20px; }
        .decoration-3 { bottom: 20px; left: 20px; }
        .decoration-4 { bottom: 20px; right: 20px; }

        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btns .btn {
            flex: 1;
            padding: 12px;
        }

        .history {
            margin-top: 20px;
        }

        .history h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid #667eea;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px 15px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.2);
        }

        .history-item .time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .no-history {
            color: rgba(255,255,255,0.5);
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 24px; }
            .card { padding: 20px; }
            .style-grid { grid-template-columns: repeat(2, 1fr); }
            .preview-card .title { font-size: 26px; }
            .preview-card .name { font-size: 20px; }
            .preview-card .message { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 高考祝福卡片生成器</h1>
            <p>为考生送上最真挚的祝福</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>你的昵称</label>
                <input type="text" id="name" placeholder="请输入你的昵称" maxlength="20">
            </div>

            <div class="form-group">
                <label>祝福对象</label>
                <input type="text" id="targetName" placeholder="请输入考生姓名" maxlength="20">
            </div>

            <div class="form-group">
                <label>祝福语类型</label>
                <select id="blessingType">
                    <option value="1">金榜题名</option>
                    <option value="2">前程似锦</option>
                    <option value="3">马到成功</option>
                    <option value="4">旗开得胜</option>
                    <option value="5">鹏程万里</option>
                    <option value="6">功成名就</option>
                    <option value="7">学有所成</option>
                    <option value="8">-custom">自定义祝福语</option>
                </select>
            </div>

            <div class="form-group" id="customBlessingGroup" style="display: none;">
                <label>自定义祝福语</label>
                <textarea id="customBlessing" placeholder="请输入自定义祝福语" rows="2" maxlength="50"></textarea>
            </div>

            <div class="form-group">
                <label>选择风格</label>
                <div class="style-grid">
                    <div class="style-option style-1 active" data-style="1">梦想紫</div>
                    <div class="style-option style-2" data-style="2">青春粉</div>
                    <div class="style-option style-3" data-style="3">海洋蓝</div>
                    <div class="style-option style-4" data-style="4">希望绿</div>
                    <div class="style-option style-5" data-style="5">阳光橙</div>
                    <div class="style-option style-6" data-style="6">清新薄荷</div>
                    <div class="style-option style-7" data-style="7">樱花粉</div>
                    <div class="style-option style-8" data-style="8">暖阳黄</div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="generateCard()">生成祝福卡片</button>
        </div>

        <div class="preview" id="preview">
            <div class="card">
                <div class="preview-card" id="previewCard">
                    <span class="decoration decoration-1">📚</span>
                    <span class="decoration decoration-2">🎓</span>
                    <span class="decoration decoration-3">⭐</span>
                    <span class="decoration decoration-4">🌟</span>
                    <div class="badge" id="badgeText">高考祝福</div>
                    <div class="title" id="titleText">金榜题名</div>
                    <div class="name" id="nameText">亲爱的考生</div>
                    <div class="message" id="messageText">愿你前程似锦，未来可期！加油！</div>
                    <div class="footer" id="footerText">—— 来自朋友的祝福</div>
                </div>
                <div class="action-btns">
                    <button class="btn btn-primary" onclick="downloadCard()">📥 下载图片</button>
                    <button class="btn btn-secondary" onclick="copyCard()">📋 复制到剪贴板</button>
                </div>
            </div>
        </div>

        <div class="history">
            <h3>历史记录</h3>
            <div class="history-list" id="historyList">
                <div class="no-history">暂无历史记录</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        const blessingMessages = {
            '1': {
                title: '金榜题名',
                message: '十年寒窗今朝梦，金榜题名会有时。愿你披荆斩棘，乘风破浪，考上理想的大学！'
            },
            '2': {
                title: '前程似锦',
                message: '愿你前程如星光璀璨，未来如彩虹绚丽。高考只是起点，精彩人生等你书写！'
            },
            '3': {
                title: '马到成功',
                message: '策马奔腾赴考场，功成名就耀门楣。相信自己，你一定可以的！'
            },
            '4': {
                title: '旗开得胜',
                message: '旗开得胜马到成功，金榜题名未来可期。加油，考生！胜利属于你！'
            },
            '5': {
                title: '鹏程万里',
                message: '大鹏一日同风起，扶摇直上九万里。愿你展翅高飞，实现心中梦想！'
            },
            '6': {
                title: '功成名就',
                message: '十年磨一剑，今朝试锋芒。愿你功成名就，荣耀归来！'
            },
            '7': {
                title: '学有所成',
                message: '学海无涯苦作舟，书山有路勤为径。愿你学有所成，前途光明！'
            }
        };

        const styleColors = {
            '1': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            '2': 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            '3': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            '4': 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            '5': 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            '6': 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
            '7': 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
            '8': 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)'
        };

        let currentStyle = '1';

        // 初始化
        document.querySelectorAll('.style-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.style-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
            });
        });

        document.getElementById('blessingType').addEventListener('change', function() {
            const customGroup = document.getElementById('customBlessingGroup');
            customGroup.style.display = this.value === 'custom' ? 'block' : 'none';
        });

        function generateCard() {
            const name = document.getElementById('name').value.trim() || '神秘好友';
            const targetName = document.getElementById('targetName').value.trim() || '考生';
            const blessingType = document.getElementById('blessingType').value;
            const customBlessing = document.getElementById('customBlessing').value.trim();

            let blessing;
            if (blessingType === 'custom') {
                blessing = {
                    title: customBlessing ? '祝福' : '加油',
                    message: customBlessing || '愿你金榜题名，前程似锦！'
                };
            } else {
                blessing = blessingMessages[blessingType];
            }

            // 更新预览
            document.getElementById('previewCard').style.background = styleColors[currentStyle];
            document.getElementById('nameText').textContent = targetName + '，加油！';
            document.getElementById('titleText').textContent = blessing.title;
            document.getElementById('messageText').textContent = blessing.message;
            document.getElementById('footerText').textContent = '—— ' + name + ' 的祝福';

            // 判断文字颜色
            const isLightStyle = ['6', '7', '8'].includes(currentStyle);
            const textColor = isLightStyle ? '#333' : '#fff';
            document.getElementById('titleText').style.color = textColor;
            document.getElementById('nameText').style.color = textColor;
            document.getElementById('messageText').style.color = textColor;
            document.getElementById('footerText').style.color = textColor;
            document.getElementById('badgeText').style.color = textColor;

            document.getElementById('preview').classList.add('active');

            // 保存历史
            saveHistory(name, targetName, blessing.title);
        }

        function saveHistory(name, targetName, title) {
            const history = JSON.parse(localStorage.getItem('examBlessingHistory') || '[]');
            const item = {
                name,
                targetName,
                title,
                time: new Date().toLocaleString('zh-CN')
            };
            history.unshift(item);
            if (history.length > 10) history.pop();
            localStorage.setItem('examBlessingHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('examBlessingHistory') || '[]');
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                list.innerHTML = '<div class="no-history">暂无历史记录</div>';
                return;
            }

            list.innerHTML = history.map((item, index) => `
                <div class="history-item" onclick="loadHistory(${index})">
                    祝福 ${item.targetName} - ${item.title}
                    <div class="time">${item.time}</div>
                </div>
            `).join('');
        }

        function loadHistory(index) {
            const history = JSON.parse(localStorage.getItem('examBlessingHistory') || '[]');
            const item = history[index];
            if (item) {
                document.getElementById('name').value = item.name;
                document.getElementById('targetName').value = item.targetName;
                generateCard();
            }
        }

        function downloadCard() {
            const card = document.getElementById('previewCard');
            html2canvas(card, {
                scale: 2,
                backgroundColor: null,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '高考祝福.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('图片已下载！');
            });
        }

        function copyCard() {
            const card = document.getElementById('previewCard');
            html2canvas(card, {
                scale: 2,
                backgroundColor: null
            }).then(canvas => {
                canvas.toBlob(blob => {
                    const item = new ClipboardItem({ 'image/png': blob });
                    navigator.clipboard.write([item]).then(() => {
                        showToast('已复制到剪贴板！');
                    }).catch(() => {
                        showToast('复制失败，请手动截图');
                    });
                });
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 页面加载时显示历史
        renderHistory();
    </script>
</body>
</html>
